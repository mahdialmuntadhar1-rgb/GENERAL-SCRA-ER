<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Iraq Business Directory</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 60px 40px;
        text-align: center;
        max-width: 600px;
      }
      h1 {
        font-size: 120px;
        color: #FF6B35;
        margin: 0;
        line-height: 1;
      }
      h2 {
        font-size: 32px;
        color: #333;
        margin: 20px 0;
      }
      p {
        font-size: 16px;
        color: #666;
        line-height: 1.6;
        margin: 20px 0;
      }
      a {
        display: inline-block;
        margin-top: 30px;
        padding: 12px 40px;
        background: #FF6B35;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        transition: background 0.3s;
      }
      a:hover {
        background: #e55a24;
      }
      .details {
        font-size: 14px;
        color: #999;
        margin-top: 40px;
        border-top: 1px solid #eee;
        padding-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>Sorry, the page you're looking for doesn't exist or has been moved. The directory has been updated with real data from Supabase.</p>
      <a href="/">← Back to Home</a>
      <div class="details">
        <p>If you believe this is a mistake, please check the URL and try again.</p>
      </div>
    </div>
  </body>
</html>
